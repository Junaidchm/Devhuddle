name: Notification Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'notification-service/**'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  GKE_ZONE: ${{ secrets.GKE_ZONE }}
  IMAGE: devhuddle-notification-service

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 1. Lowercase repository owner (GHCR requires lowercase)
    - name: Lowercase repo owner
      run: |
        echo "OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
      env:
        OWNER: '${{ github.repository_owner }}'

    # 2. Login to GHCR
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ env.OWNER_LC }}
        password: ${{ secrets.GHCR_TOKEN }}

    # 3. Build multi-platform image (amd64 for GKE)
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ./notification-service
        file: ./notification-service/Dockerfile.prod
        platforms: linux/amd64
        push: true
        tags: |
          ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE }}:latest
          ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE }}:${{ github.sha }}

    # 4. Authenticate to Google Cloud
    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GKE_SA_KEY }}'

    # 5. Get GKE Credentials
    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}

    # 6. Deploy to GKE
    - name: Deploy
      run: |
        kubectl rollout restart deployment notification-service
        kubectl rollout status deployment notification-service
