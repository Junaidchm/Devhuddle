services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.prod
    container_name: api-gateway-prod
    ports:
      - "8080:8080"
    env_file:
      - ./api-gateway/.env
    depends_on:
      - redis
      - auth-service
      - post-service
      - notification-service
      - project-service
      - media-service
      - zookeeper
      - kafka
    networks:
      - shared
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile.prod
    container_name: auth-service-prod
    ports:
      - "3001:3001"
      - "50051:50051"
    depends_on:
      - kafka
      - zookeeper
      - redis
    env_file:
      - ./auth-service/.env
    networks:
      - shared
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
  
  chat-service:
    build: 
      context: ./chat-service
      dockerfile: Dockerfile.prod
    container_name: chat-service-prod
    ports:
      - "4004:4004"
    depends_on:
      - kafka
      - zookeeper
      - redis
    env_file:
      - ./chat-service/.env
    networks:
      - shared
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile.prod
    container_name: notification-service-prod
    ports:
      - "4001:4001"
    depends_on:
      - kafka
      - zookeeper
      - redis
      - auth-service
    env_file:
      - ./notification-service/.env
    networks:
      - shared
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  post-service:
    build:
      context: ./post-service
      dockerfile: Dockerfile.prod
    container_name: post-service-prod
    depends_on:
      - kafka
      - zookeeper
      - redis
    env_file:
      - ./post-service/.env
    networks:
      - shared
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped  

  project-service:
    build:
      context: ./project-service
      dockerfile: Dockerfile.prod
    container_name: project-service-prod
    ports:
      - "3004:3004"
      - "50053:50053"
    depends_on:
      - kafka
      - zookeeper
      - redis
    env_file:
      - ./project-service/.env
    networks:
      - shared
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  media-service:
    build:
      context: ./media-service
      dockerfile: Dockerfile.prod
    container_name: media-service-prod
    ports:
      - "5003:5003"
    depends_on:
      - redis
    env_file:
      - ./media-service/.env
    networks:
      - shared
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
  
  # External services for local testing
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper-prod
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - kafka_data_prod:/var/lib/kafka/data
    networks:
      - shared
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-prod
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - shared
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: redis-prod
    volumes:
      - redis_data_prod:/data
    networks:
      - shared
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  redis_data_prod:
  kafka_data_prod:
    driver: local 

networks:
  shared:
    driver: bridge
