apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: auth-service
        image: ghcr.io/junaidchm/auth-service:latest
        ports:
        - containerPort: 3001
        - containerPort: 50051
        envFrom:
        - configMapRef:
            name: devhuddle-config
        - secretRef:
            name: devhuddle-secrets
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: devhuddle-secrets
              key: AUTH_DATABASE_URL
        - name: ACCESS_TOKEN_SECRET
          valueFrom:
            secretKeyRef:
              name: devhuddle-secrets
              key: ACCESS_TOKEN_SECRET
        - name: REFRESH_TOKEN_SECRET
          valueFrom:
            secretKeyRef:
              name: devhuddle-secrets
              key: REFRESH_TOKEN_SECRET
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: devhuddle-secrets
              key: JWT_SECRET
        - name: EMAIL_PASS
          valueFrom:
            secretKeyRef:
              name: devhuddle-secrets
              key: EMAIL_PASS
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: devhuddle-secrets
              key: ENCRYPTION_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
  - name: http
    port: 3001
    targetPort: 3001
  - name: grpc
    port: 50051
    targetPort: 50051
