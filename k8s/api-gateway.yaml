apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: api-gateway
        image: ghcr.io/junaidchm/api-gateway:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: devhuddle-config
        - secretRef:
            name: devhuddle-secrets
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: devhuddle-secrets
              key: JWT_SECRET
        - name: ACCESS_TOKEN_SECRET
          valueFrom:
            secretKeyRef:
              name: devhuddle-secrets
              key: ACCESS_TOKEN_SECRET
        - name: REFRESH_TOKEN_SECRET
          valueFrom:
            secretKeyRef:
              name: devhuddle-secrets
              key: REFRESH_TOKEN_SECRET
        - name: AWS_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: devhuddle-secrets
              key: AWS_ACCESS_KEY
        - name: AWS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: devhuddle-secrets
              key: AWS_SECRET_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: ClusterIP
